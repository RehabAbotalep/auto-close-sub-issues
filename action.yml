name: Auto Close Sub-Issues
description: Automatically closes all sub-issues associated with a parent issue when the parent is closed.
author: Rehab Ragab
branding:
  icon: "check-circle"
  color: "green"

inputs:
  github_token:
    description: "GitHub token for authentication."
    required: true
  issue_number:
    description: "The issue number of the parent issue."
    required: true
  repository:
    description: "The repository in 'owner/repo' format."
    required: true

outputs:
  closed_count:
    description: "The number of sub-issues that were successfully closed."
  total_count:
    description: "The total number of sub-issues found, including already-closed ones."

runs:
  using: "node20"
  main: "dist/index.js"